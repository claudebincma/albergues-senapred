name: Buscar noticias de albergues (diario, mediodía Santiago)

on:
  schedule:
    # 12:00 América/Santiago = 16:00 UTC en julio (Chile sin horario de verano)
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Cortar automatización después del 23 de julio 2026
        id: window
        run: |
          cutoff="2026-07-23"
          today=$(date -u +%F)
          if [[ "$today" > "$cutoff" ]]; then
            echo "Fuera de la ventana (corte: $cutoff). Se omite esta corrida."
            echo "in_window=false" >> "$GITHUB_OUTPUT"
          else
            echo "in_window=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.window.outputs.in_window == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Buscar noticias nuevas
        if: steps.window.outputs.in_window == 'true'
        id: scrape
        run: |
          python scripts/scrape_news.py
          echo "found=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Crear rama y PR si hay noticias nuevas
        if: steps.window.outputs.in_window == 'true' && steps.scrape.outputs.found == '1'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: albergues-noticias-${{ github.run_number }}
          commit-message: "Noticias candidatas de albergues (revisión pendiente)"
          title: "🔔 Noticias candidatas de albergues — revisar antes de publicar"
          body-path: pending_review.md
          add-paths: |
            pending_review.md
            seen_articles.json
          labels: albergues-review
